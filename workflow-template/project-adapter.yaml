project:
  name: dpiny-rtk
  root: ..
  mcu: STM32F407VET6
  toolchain: STM32CubeCLT
  build_dir: build/Debug
  elf: build/Debug/dpiny-RTK.elf

build:
  command: ninja
  working_dir: build/Debug

flash:
  tool: STM32_Programmer_CLI
  interface: SWD
  verify: true
  reset: true

serial:
  shell_port: COM4
  debug_port: COM11
  rtcm_port: COM6
  baudrate: 115200
  require_dtr_rts: true

tests:
  - name: shell
    script: tools/test_shell.ps1
    pass_keywords:
      - PASS
      - OK
  - name: rtcm
    script: tools/rtcm_parse.ps1
    pass_conditions:
      crc_bad_max: 0

register_probe:
  enabled: true
  interface: SWD
  targets:
    - rcc
    - gpio
    - usart
    - usb
    - fault
