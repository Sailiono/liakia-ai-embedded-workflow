<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="dpiny-RTK AI embedded workflow technical console preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10120f"/>
      <stop offset="0.62" stop-color="#151b16"/>
      <stop offset="1" stop-color="#222016"/>
    </linearGradient>
    <linearGradient id="active" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#80ff72" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#54d7ff" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0v42" fill="none" stroke="#f4f1e8" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <style>
      .title{font:800 44px "Segoe UI","Microsoft YaHei",Arial,sans-serif;fill:#f4f1e8}
      .kicker{font:800 15px "Cascadia Code",Consolas,monospace;fill:#80ff72}
      .muted{font:400 17px "Segoe UI","Microsoft YaHei",Arial,sans-serif;fill:#b8beb8}
      .mono{font:400 14px "Cascadia Code",Consolas,monospace;fill:#d7ded2}
      .monoSmall{font:400 12px "Cascadia Code",Consolas,monospace;fill:#b8beb8}
      .green{fill:#80ff72}
      .cyan{fill:#54d7ff}
      .amber{fill:#ffb84d}
      .card{fill:rgba(244,241,232,0.055);stroke:#f4f1e8;stroke-opacity:.16;rx:8}
      .panel{fill:#11140f;stroke:#f4f1e8;stroke-opacity:.16;rx:8;filter:url(#shadow)}
      .line{stroke:#54d7ff;stroke-opacity:.42}
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <rect width="1200" height="760" fill="url(#grid)"/>
  <rect x="0" y="0" width="1200" height="760" fill="none" stroke="#f4f1e8" stroke-opacity="0.06"/>

  <text x="64" y="72" class="kicker">AI EMBEDDED DELIVERY WORKFLOW</text>
  <text x="64" y="128" class="title">从需求到可验证固件，一条命令交付嵌入式系统</text>
  <text x="64" y="166" class="muted">需求规约 / 任务编排 / 编译构建 / 接口映射 / 测试执行 / 证据归档</text>
  <g transform="translate(64 184)">
    <rect width="220" height="34" rx="8" fill="#121611" stroke="#80ff72" stroke-opacity=".34"/>
    <text x="14" y="22" class="monoSmall" fill="#80ff72">API bill: ¥9.22 CNY</text>
  </g>
  <g transform="translate(300 184)">
    <rect width="190" height="34" rx="8" fill="#121611" stroke="#54d7ff" stroke-opacity=".34"/>
    <text x="14" y="22" class="monoSmall" fill="#54d7ff">1 person / 3 days</text>
  </g>
  <g transform="translate(506 184)">
    <rect width="230" height="34" rx="8" fill="#121611" stroke="#ffb84d" stroke-opacity=".34"/>
    <text x="14" y="22" class="monoSmall" fill="#ffb84d">cost down: 80-88%</text>
  </g>

  <g transform="translate(64 218)">
    <rect class="card" width="300" height="78"/>
    <text x="22" y="31" class="kicker">01</text>
    <text x="68" y="33" class="muted" fill="#f4f1e8" font-weight="700">需求规约</text>
    <text x="68" y="58" class="monoSmall">input.yaml -> normalized spec</text>
  </g>
  <g transform="translate(384 218)">
    <rect class="card" width="300" height="78"/>
    <text x="22" y="31" class="kicker">02</text>
    <text x="68" y="33" class="muted" fill="#f4f1e8" font-weight="700">任务编排</text>
    <text x="68" y="58" class="monoSmall">module graph + risk register</text>
  </g>
  <g transform="translate(704 218)">
    <rect width="360" height="78" rx="8" fill="url(#active)" stroke="#80ff72" stroke-opacity=".46"/>
    <text x="22" y="31" class="kicker">03</text>
    <text x="68" y="33" class="muted" fill="#f4f1e8" font-weight="700">编译构建</text>
    <text x="68" y="58" class="monoSmall">make -j8 BUILD=Debug</text>
  </g>

  <g transform="translate(64 316)">
    <rect class="card" width="300" height="78"/>
    <text x="22" y="31" class="kicker">04</text>
    <text x="68" y="33" class="muted" fill="#f4f1e8" font-weight="700">接口映射</text>
    <text x="68" y="58" class="monoSmall">UART4 / USB CDC / RS422 x2</text>
  </g>
  <g transform="translate(384 316)">
    <rect class="card" width="300" height="78"/>
    <text x="22" y="31" class="kicker">05</text>
    <text x="68" y="33" class="muted" fill="#f4f1e8" font-weight="700">测试执行</text>
    <text x="68" y="58" class="monoSmall">baseline runner + RTCM CRC</text>
  </g>
  <g transform="translate(704 316)">
    <rect class="card" width="360" height="78"/>
    <text x="22" y="31" class="kicker">06</text>
    <text x="68" y="33" class="muted" fill="#f4f1e8" font-weight="700">证据归档</text>
    <text x="68" y="58" class="monoSmall">summary.md + manifest.json</text>
  </g>

  <g transform="translate(64 430)">
    <rect class="panel" width="1072" height="260"/>
    <rect x="0" y="0" width="1072" height="48" rx="8" fill="#151913" stroke="#f4f1e8" stroke-opacity=".12"/>
    <text x="22" y="30" class="kicker">STAGE 03 / BUILD TERMINAL</text>
    <text x="808" y="30" class="monoSmall">target: STM32F407VET6 / Cortex-M4F</text>

    <rect x="22" y="68" width="500" height="42" rx="8" fill="#080a08" stroke="#f4f1e8" stroke-opacity=".14"/>
    <text x="42" y="95" class="green mono">$</text>
    <text x="74" y="95" class="mono">make -j8 BUILD=Debug</text>

    <text x="30" y="138" class="monoSmall" fill="#54d7ff">cmake --preset Debug</text>
    <text x="30" y="164" class="monoSmall">-- Toolchain: arm-none-eabi-gcc 13.3.1</text>
    <text x="30" y="190" class="monoSmall">[ 18%] Building C object Core/Src/gnss.c.obj</text>
    <text x="30" y="216" class="monoSmall">[ 44%] Building C object Core/Src/shell.c.obj</text>
    <text x="30" y="242" class="monoSmall" fill="#ffb84d">[ 86%] Linking C executable dpiny-RTK.elf</text>

    <rect x="570" y="72" width="110" height="82" rx="8" fill="#121611" stroke="#80ff72" stroke-opacity=".42"/>
    <text x="594" y="103" class="monoSmall">ELF</text>
    <text x="592" y="132" class="green mono">118.9 KB</text>
    <rect x="704" y="72" width="110" height="82" rx="8" fill="#121611" stroke="#80ff72" stroke-opacity=".42"/>
    <text x="728" y="103" class="monoSmall">HEX</text>
    <text x="730" y="132" class="green mono">ready</text>
    <rect x="838" y="72" width="110" height="82" rx="8" fill="#121611" stroke="#80ff72" stroke-opacity=".42"/>
    <text x="862" y="103" class="monoSmall">BIN</text>
    <text x="864" y="132" class="green mono">ready</text>
    <rect x="972" y="72" width="78" height="82" rx="8" fill="#121611" stroke="#80ff72" stroke-opacity=".42"/>
    <text x="992" y="103" class="monoSmall">SIZE</text>
    <text x="996" y="132" class="green mono">OK</text>

    <text x="570" y="196" class="monoSmall" fill="#80ff72">[100%] Built target dpiny-RTK</text>
    <text x="570" y="224" class="monoSmall">text=117284 data=1688 bss=29120 flash=118972</text>
    <text x="570" y="252" class="monoSmall">artifacts: dpiny-RTK.elf / .hex / .bin</text>
  </g>
</svg>
